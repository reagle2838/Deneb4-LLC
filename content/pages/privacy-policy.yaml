body: >-
  Effective Date: 06/30/2026


  Deneb4 LLC (“Deneb4,” “we,” “us,” or “our”) respects your privacy. This
  Privacy Policy explains what information we collect through our website,
  deneb4.com, and related communications, how we use that information, and how
  you can contact us with questions.


  Deneb4 provides web design, web development, CMS, and related digital services
  primarily for U.S.-based business clients.


  1. Information We Collect


  We may collect information that you provide directly to us, including:


  name;

  email address;

  phone number;

  company name;

  website URL;

  project budget;

  message or project description;

  files or materials you upload through our website or send to us;

  information you provide during discovery calls, project discussions,
  onboarding, or client communications.


  If we provide a client portal, dashboard, or login-based project area, we may
  also collect account-related information, such as your login credentials,
  account access details, project materials, messages, file uploads, and
  activity related to your use of the portal.


  We may also automatically collect certain technical information when you visit
  our website, such as:


  IP address;

  browser type;

  device type;

  pages viewed;

  referral sources;

  approximate location;

  time spent on the site;

  interactions with forms or pages;

  cookies or similar tracking technologies.

  2. How We Use Information


  We use the information we collect to:


  respond to inquiries;

  evaluate potential projects;

  prepare proposals, estimates, and service recommendations;

  communicate with prospective and current clients;

  provide web design, development, CMS, consulting, and related services;

  manage project files and client communications;

  operate and improve our website;

  understand website traffic and user behavior;

  maintain security and prevent misuse;

  create invoices and manage business records;

  comply with legal, tax, accounting, and business obligations.

  3. Contact Forms and File Uploads


  When you submit a form or upload files through deneb4.com, we use that
  information to review your inquiry and respond to you.


  Please do not submit sensitive personal information through our website unless
  we specifically request it. This includes Social Security numbers, bank
  account numbers, passwords, medical information, or other highly sensitive
  information.


  If you upload logos, images, documents, copy, technical information, or other
  business materials, you represent that you have the right to share those
  materials with us.


  4. Google Analytics and Cookies


  We use or may use Google Analytics 4 to understand how visitors use our
  website. Google Analytics may collect information such as pages visited, time
  spent on pages, device information, browser information, approximate location,
  and interactions with the website.


  Google Analytics uses cookies and similar technologies to help analyze website
  traffic and usage. You can control cookies through your browser settings. Some
  parts of the website may not work as intended if cookies are disabled.


  5. Scheduling Tools


  We may add a scheduling tool, such as Calendly or a similar service, in the
  future. If you book a call through a scheduling tool, that tool may collect
  information such as your name, email address, phone number, meeting time, and
  any information you provide in the booking form.


  We will update this Privacy Policy if our use of scheduling tools materially
  changes how we collect or process information.


  6. Payments and Invoicing


  At this time, Deneb4 generally invoices clients separately rather than
  accepting direct payments through deneb4.com.


  If we use third-party invoicing or payment providers, such as Wave, Stripe, or
  similar services, those providers may collect and process payment-related
  information according to their own privacy policies and terms.


  We do not intend to collect or store full credit card numbers directly on
  deneb4.com.


  7. Email Marketing


  We do not currently operate a newsletter or general email marketing list.


  If we later offer newsletters, updates, or marketing emails, you will be able
  to unsubscribe or opt out of those emails.


  We may still send transactional or project-related emails, such as messages
  about inquiries, proposals, invoices, active projects, account access, or
  service updates.


  8. Use of AI Tools


  Deneb4 may use AI-assisted tools to support parts of our workflow, including
  brainstorming, drafting, summarizing, organizing project notes, reviewing
  content, generating code concepts, troubleshooting, research, or improving
  internal processes.


  When using AI tools, we aim to avoid submitting sensitive personal
  information, passwords, financial account details, or other highly sensitive
  information unless it is necessary to provide services or you have authorized
  us to use that information.


  Client-specific confidentiality, AI usage, ownership, and data-handling terms
  may also be addressed in a separate client agreement, proposal, NDA, or
  statement of work.


  9. How We Share Information


  We do not sell your personal information.


  We may share information with third parties when reasonably necessary to
  operate our business, provide services, or comply with legal obligations.
  These may include:


  website hosting providers;

  analytics providers;

  email and communication tools;

  cloud storage providers;

  project management tools;

  invoicing and payment providers;

  scheduling tools, if used;

  AI-assisted tools, if used as part of our workflow;

  professional advisors, such as accountants, attorneys, or tax professionals;

  government authorities or other parties when required by law.


  We may also share information if needed to protect our rights, enforce our
  agreements, prevent fraud or security issues, or complete a business transfer
  such as a merger, acquisition, or sale of assets.


  10. Data Retention


  We keep information for as long as reasonably necessary for the purposes
  described in this Privacy Policy, including responding to inquiries, providing
  services, maintaining business records, resolving disputes, and complying with
  legal, tax, accounting, or contractual obligations.


  We may retain project records, communications, invoices, and related business
  information for our legitimate business and legal recordkeeping needs.


  11. Data Security


  We use reasonable administrative, technical, and organizational measures to
  protect information. However, no website, email system, file upload system, or
  internet transmission is completely secure.


  You are responsible for taking care when sending confidential or sensitive
  information online.


  12. Children’s Privacy


  Deneb4 is intended for businesses and adults. Our website and services are not
  directed to children under 13.


  We do not knowingly collect personal information from children under 13. If we
  learn that we have collected personal information from a child under 13, we
  will take reasonable steps to delete it.


  13. U.S.-Based Services


  Deneb4 is based in the United States and is intended primarily for U.S.-based
  business clients. If you access our website from outside the United States,
  you understand that your information may be processed in the United States.


  14. Your Choices


  You may contact us to request that we update, correct, or delete certain
  personal information, subject to legal, contractual, accounting, and business
  recordkeeping requirements.


  You may also control cookies through your browser settings.


  15. Third-Party Websites and Tools


  Our website may link to third-party websites, tools, or services. We are not
  responsible for the privacy practices, content, or security of third-party
  websites or services.


  16. Changes to This Privacy Policy


  We may update this Privacy Policy from time to time. When we do, we will
  update the effective date above.


  Your continued use of deneb4.com after changes are posted means you accept the
  updated Privacy Policy.


  17. Contact Us


  For questions about this Privacy Policy or how we handle information, contact
  us at:


  Deneb4 LLC

  Email: hello@deneb4.com
