  5. Client Agreements Control


  If you become a Deneb4 client, your project may be governed by additional
  terms, including a proposal, contract, statement of work, invoice, NDA, or
  other written agreement.


  If there is a conflict between these Website Terms and a signed client
  agreement, the signed client agreement controls for that project.


  6. User Submissions and File Uploads


  If you submit information, files, copy, images, logos, documents, business
  details, technical materials, or other content through our website or client
  portal, you represent that:


  the information is accurate to the best of your knowledge;

  you have the right to submit and use those materials;

  the materials do not violate the rights of another person or business;

  the materials do not contain unlawful, harmful, or malicious content.


  You grant Deneb4 permission to use submitted materials as reasonably necessary
  to review your inquiry, prepare proposals, provide services, communicate with
  you, manage projects, and perform related business functions.


  Do not submit passwords, Social Security numbers, financial account numbers,
  medical information, trade secrets, or highly sensitive information through
  general website forms unless we specifically request it or have a separate
  agreement covering that information.


  7. Confidential Information


  General website forms and discovery communications are not automatically
  covered by an NDA.


  If you need to share confidential, proprietary, technical, financial, or
  sensitive business information, tell us first so we can decide whether an NDA
  or written confidentiality agreement is appropriate.


  Confidentiality obligations for client projects may be addressed in a separate
  NDA, proposal, contract, or statement of work.


  8. Client Portals and Accounts


  If Deneb4 provides access to a client portal, dashboard, CMS, staging site, or
